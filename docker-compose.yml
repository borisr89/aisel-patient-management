services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aisel_patients
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d aisel_patients"
        ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data: